name: Project_CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Display Build Information
        run: |
          echo "========================================"
          echo "Project Name : SchemaCraft AI"
          echo "Workflow     : Project_CI"
          echo "Run Number   : ${{ github.run_number }}"
          echo "Run ID       : ${{ github.run_id }}"
          echo "Triggered By : ${{ github.actor }}"
          echo "Branch       : ${{ github.event.inputs.branch }}"
          echo "Commit SHA   : $(git rev-parse --short HEAD)"
          echo "========================================"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm test

      - name: Build Application
        run: npm run build

      - name: Show Build Output
        run: |
          echo "Build completed successfully."
          ls -la

      - name: Create Deployment Package
        run: |
          zip -r schemacraft-build-${{ github.run_number }}.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: schemacraft-build-${{ github.run_number }}
          path: schemacraft-build-${{ github.run_number }}.zip
          retention-days: 30

      - name: Build Summary
        run: |
          echo "========================================"
          echo "CI Pipeline Completed Successfully"
          echo "Artifact : schemacraft-build-${{ github.run_number }}"
          echo "========================================"