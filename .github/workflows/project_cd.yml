name: Project_CD

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git Branch"
        required: true
        default: "develop/chirag"

      build_number:
        description: "CI Build Number"
        required: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:

    name: Deploy Application

    runs-on: ubuntu-latest

    env:
      REPO_OWNER: jagat546
      REPO_NAME: schemacraft-ai

    steps:

      - name: Display Deployment Information
        run: |
          echo "========================================"
          echo "Project Name : SchemaCraft AI"
          echo "Branch       : ${{ github.event.inputs.branch }}"
          echo "Build Number : ${{ github.event.inputs.build_number }}"
          echo "========================================"

      - name: Get Artifact Information
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            --repo $REPO_OWNER/$REPO_NAME \
            --workflow project_ci.yml \
            --branch "${{ github.event.inputs.branch }}" \
            --json databaseId,number \
            --jq '.[] | select(.number == ${{ github.event.inputs.build_number }}) | .databaseId')

          echo "Run ID : $RUN_ID"

          ARTIFACT_ID=$(gh api \
            repos/$REPO_OWNER/$REPO_NAME/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[0].id')

          echo "Artifact ID : $ARTIFACT_ID"

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "ARTIFACT_ID=$ARTIFACT_ID" >> $GITHUB_ENV

      - name: Download Artifact
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/artifacts/$ARTIFACT_ID/zip \
            -o schemacraft-build.zip

      - name: Verify Artifact
        run: |
          ls -lh
          unzip -l schemacraft-build.zip

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload Artifact to EC2
        run: |
          scp schemacraft-build.zip \
            ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/tmp/

      - name: Deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          sudo rm -rf /opt/schemacraft-ai-new
          sudo mkdir -p /opt/schemacraft-ai-new
          sudo chown -R ubuntu:ubuntu /opt/schemacraft-ai-new

          cd /opt/schemacraft-ai-new

          unzip -o /tmp/schemacraft-build.zip

          unzip -o schemacraft-build-*.zip

          cp /opt/schemacraft-ai/.env .

          npm ci

          npm run build

          sudo rm -rf /opt/schemacraft-ai-old

          if [ -d /opt/schemacraft-ai ]; then
            sudo mv /opt/schemacraft-ai /opt/schemacraft-ai-old
          fi

          sudo mv /opt/schemacraft-ai-new /opt/schemacraft-ai
          sudo chown -R ubuntu:ubuntu /opt/schemacraft-ai

          cd /opt/schemacraft-ai

          pm2 delete schemacraft-ai || true
          pm2 start npm --name schemacraft-ai -- start
          pm2 save

          EOF

      - name: Verify Deployment
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

          pm2 status

          curl -I http://localhost:3000 || true

          EOF