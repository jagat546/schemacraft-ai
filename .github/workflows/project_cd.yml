name: Project_CD

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git Branch"
        required: true
        default: "develop/chirag"

      build_number:
        description: "CI Build Number"
        required: true

permissions:
  contents: read

jobs:
  deploy:

    name: Deploy to EC2

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          RUN_ID=$(gh run list \
            --workflow=project_ci.yml \
            --branch=${{ github.event.inputs.branch }} \
            --limit=1 \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "Run ID : $RUN_ID"

          ARTIFACT_ID=$(gh api \
            repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[0].id')

          echo "Artifact ID : $ARTIFACT_ID"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            -o schemacraft-build-${{ github.event.inputs.build_number }}.zip

      - name: Verify Artifact
        run: |
          ls -lh
          unzip -l schemacraft-build-${{ github.event.inputs.build_number }}.zip

      - name: Deploy to EC2
        run: |

          scp -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          schemacraft-build-${{ github.event.inputs.build_number }}.zip \
          ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/opt/schemacraft-ai/

          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

          cd /opt/schemacraft-ai

          unzip -o schemacraft-build-${{ github.event.inputs.build_number }}.zip

          npm install

          export NODE_OPTIONS="--max-old-space-size=2048"

          npm run build

          pm2 restart schemacraft-ai

          EOF
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}