name: Project CD

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Enter CI Build Number"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Selected Build Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          echo "=================================="
          echo "Project CD Started"
          echo "Build : ${{ github.event.inputs.build_number }}"
          echo "=================================="

          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "Project CI" \
            --branch develop/chirag \
            --limit 100 \
            --json databaseId,artifacts \
            --jq '.[] | select(.artifacts[].name=="schemacraft-build-${{ github.event.inputs.build_number }}") | .databaseId' \
            | head -1)

          if [ -z "$RUN_ID" ]; then
            echo "Artifact schemacraft-build-${{ github.event.inputs.build_number }} not found."
            exit 1
          fi

          echo "Run ID : $RUN_ID"

          ARTIFACT_ID=$(gh api \
            repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[] | select(.name=="schemacraft-build-${{ github.event.inputs.build_number }}") | .id')

          echo "Artifact ID : $ARTIFACT_ID"

          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            -o schemacraft-build.zip

      - name: Copy Artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "schemacraft-build.zip"
          target: "/tmp"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |

            sudo mkdir -p /opt/schemacraft-ai
            sudo chown -R $USER:$USER /opt/schemacraft-ai

            cd /opt/schemacraft-ai

            rm -rf *

            unzip -oq /tmp/schemacraft-build.zip

            npm install --omit=dev

            pm2 delete schemacraft-ai || true

            pm2 start npm --name schemacraft-ai -- start

            pm2 save

            echo "=================================="
            echo "Deployment Completed Successfully"
            echo "=================================="