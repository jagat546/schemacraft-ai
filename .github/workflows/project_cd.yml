name: Project_CD

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git Branch"
        required: true
        default: "main"

      build_number:
        description: "CI Build Number"
        required: true

permissions:
  contents: read
  actions: read

jobs:

  deploy:

    name: Deploy Build

    runs-on: ubuntu-latest

    env:
      REPO_OWNER: jagat546
      REPO_NAME: schemacraft-ai

    steps:

      - name: Display Deployment Information
        run: |
          echo "========================================"
          echo "Project Name : SchemaCraft AI"
          echo "Branch       : ${{ github.event.inputs.branch }}"
          echo "Build Number : ${{ github.event.inputs.build_number }}"
          echo "========================================"

      - name: Get Artifact Information
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            --repo $REPO_OWNER/$REPO_NAME \
            --workflow project_ci.yml \
            --branch "${{ github.event.inputs.branch }}" \
            --json databaseId,number \
            --jq '.[] | select(.number == '${{ github.event.inputs.build_number }}') | .databaseId')

          echo "Run ID : $RUN_ID"

          ARTIFACT_ID=$(gh api \
            repos/$REPO_OWNER/$REPO_NAME/actions/runs/$RUN_ID/artifacts \
            --jq '.artifacts[0].id')

          echo "Artifact ID : $ARTIFACT_ID"

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "ARTIFACT_ID=$ARTIFACT_ID" >> $GITHUB_ENV

      - name: Download Artifact
        run: |
          curl -L \
          -H "Authorization: Bearer ${{ github.token }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/actions/artifacts/$ARTIFACT_ID/zip \
          -o schemacraft-build-${{ github.event.inputs.build_number }}.zip

      - name: Verify Artifact
        run: |
          ls -lh
          unzip -l schemacraft-build-${{ github.event.inputs.build_number }}.zip