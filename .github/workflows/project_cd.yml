name: Project CD

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Enter CI Build Number"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Selected Build Artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=================================="
          echo "Project CD Started"
          echo "Build : ${{ github.event.inputs.build_number }}"
          echo "=================================="

          RUN_IDS=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "Project_CI" \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId')

          ARTIFACT_ID=""

          for RUN_ID in $RUN_IDS
          do
            echo "Checking Run : $RUN_ID"

            ARTIFACT_ID=$(gh api \
              repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts \
              --jq '.artifacts[]? | select(.name=="schemacraft-build-${{ github.event.inputs.build_number }}") | .id')

            if [ -n "$ARTIFACT_ID" ]; then
              echo "Run ID      : $RUN_ID"
              echo "Artifact ID : $ARTIFACT_ID"
              break
            fi
          done

          if [ -z "$ARTIFACT_ID" ]; then
            echo "Artifact schemacraft-build-${{ github.event.inputs.build_number }} not found."
            exit 1
          fi

          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip \
            -o schemacraft-build.zip

          echo "Downloaded Artifact"
          ls -lh schemacraft-build.zip

      - name: Copy Artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "schemacraft-build.zip"
          target: "/tmp"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR=/opt/schemacraft-ai

            sudo mkdir -p $APP_DIR
            sudo chown -R $USER:$USER $APP_DIR

            cd $APP_DIR

            rm -rf *

            # Extract GitHub artifact
            unzip -oq /tmp/schemacraft-build.zip

            # Extract deployment package
            unzip -oq schemacraft-build-*.zip

            rm -f schemacraft-build-*.zip

            echo "=================================="
            echo "Deployment Package Contents"
            echo "=================================="
            ls -lah

            export NODE_OPTIONS="--max-old-space-size=2048"

            npm install --omit=dev

            pm2 delete schemacraft-ai || true

            if [ -f ".next/standalone/server.js" ]; then
              echo "Starting Standalone Build..."
              pm2 start .next/standalone/server.js \
                --name schemacraft-ai \
                --interpreter node
            else
              echo "Starting Regular Next.js Build..."
              pm2 start npm \
                --name schemacraft-ai \
                -- start
            fi

            pm2 save

            pm2 status

            echo "=================================="
            echo "Deployment Completed Successfully"
            echo "=================================="